apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-config
data:
  Corefile: |
    .:53 {
        log
        errors
        forward . 8.8.8.8
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-vnf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coredns-vnf
  template:
    metadata:
      labels:
        app: coredns-vnf
    spec:
      containers:
      - name: coredns
        image: coredns/coredns:latest
        args: ["-conf", "/etc/coredns/Corefile"]
        volumeMounts:
        - name: config-volume
          mountPath: /etc/coredns
        ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
      volumes:
      - name: config-volume
        configMap:
          name: coredns-config

---
apiVersion: v1
kind: Service
metadata:
  name: coredns-vnf-service
spec:
  selector:
    app: coredns-vnf
  ports:
  - protocol: UDP
    port: 53
    targetPort: 53
